<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おうちに かえろう</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#fde68a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="やさしいせかい">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #e8f4e0;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  touch-action: none;
  user-select: none;
}
.container {
  text-align: center;
  width: 100%;
  max-width: 420px;
  padding: 2vw;
}
h1 {
  font-size: clamp(18px, 5vw, 22px); font-weight: 900; color: #4a8a30;
  margin-bottom: 2px;
}
.subtitle {
  font-size: clamp(10px, 2.8vw, 12px); color: #7aaa60; margin-bottom: 2vw;
}
#score-area {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-bottom: 1.5vw;
  font-size: clamp(16px, 5vw, 20px);
}
#remain-label {
  font-size: clamp(12px, 3.5vw, 14px); font-weight: 900; color: #6a9a50;
}
#msg {
  font-size: clamp(14px, 4.2vw, 17px); font-weight: 700; min-height: 24px; margin-bottom: 1vw;
  color: #4a8a30;
}

#game-canvas {
  border-radius: 20px;
  box-shadow: 0 4px 20px rgba(60,140,40,0.15);
  background: #fff;
  touch-action: none;
  width: 100%;
  max-width: 420px;
  height: auto;
  aspect-ratio: 360 / 400;
}

#permission-btn {
  display: none;
  margin: 4vw auto;
  padding: 3.5vw 8vw;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(14px, 4vw, 16px); font-weight: 900;
  border: 3px solid #5aaa40; border-radius: 60px;
  background: rgba(100,190,70,0.85); color: #fff;
  box-shadow: 0 4px 12px rgba(60,160,40,0.3);
  cursor: pointer;
}
#permission-btn:hover { background: rgba(80,170,50,0.95); }

#level-label {
  font-size: clamp(11px, 3.2vw, 13px); font-weight: 900; color: #7aaa60;
  margin-bottom: 1vw;
}

/* 結果画面 */
#result-overlay {
  display: none; position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(232,244,224,0.95);
  z-index: 100; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
#result-overlay.show { display: flex; }
#result-overlay .big { font-size: clamp(22px, 6.5vw, 26px); font-weight: 900; color: #4a8a30; }
#result-overlay .found-list { font-size: clamp(26px, 8vw, 32px); letter-spacing: 6px; }
#result-overlay .detail { font-size: clamp(13px, 3.8vw, 15px); font-weight: 700; color: #6a9a50; }
.restart-btn {
  margin-top: 2vw; padding: 2.5vw 8vw;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(15px, 4.5vw, 18px); font-weight: 900; cursor: pointer;
  border: 3px solid #5aaa40; border-radius: 60px;
  background: rgba(100,190,70,0.85); color: #fff;
  box-shadow: 0 4px 0 #3a8a20;
}

#flash-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 90; opacity: 0;
}
#flash-overlay.flash { animation: flash-bang 0.6s ease-out forwards; }
@keyframes flash-bang {
  0% { opacity:0; background: radial-gradient(circle, rgba(255,255,200,0.9), rgba(200,255,200,0.3)); }
  15% { opacity:1; } 100% { opacity:0; }
}
#sparkle-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 91;
}
</style>
</head>
<body>

<div class="container">
  <h1>🏠 おうちに かえろう 🏠</h1>
  <p class="subtitle">スマホを かたむけて おうちに いれよう！</p>

  <div id="level-label"></div>
  <div id="score-area">
    <span id="found-icons"></span>
    <span id="remain-label"></span>
  </div>
  <div id="msg">スマホを かたむけてね！</div>

  <canvas id="game-canvas" width="360" height="400"></canvas>

  <button id="permission-btn">🎮 センサーをつかう</button>
</div>

<div id="result-overlay">
  <div class="big" id="res-title"></div>
  <div class="found-list" id="res-found"></div>
  <div class="detail" id="res-detail"></div>
  <button class="restart-btn" id="restartBtn">もういっかい！</button>
</div>

<div id="flash-overlay"></div>
<canvas id="sparkle-canvas"></canvas>

<script>
const CW = 360, CH = 400;
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

const ANIMALS = ['🐶','🐱','🐰','🐹','🐸','🐧','🦊','🐻','🐵','🐼'];

const LEVELS = [
  { walls: [], animal: 0, homeX: CW/2, homeY: 50, homeR: 30, startX: CW/2, startY: CH-60 },
  { walls: [{ x: 60, y: 180, w: 240, h: 14 }], animal: 1, homeX: CW-50, homeY: 50, homeR: 30, startX: 50, startY: CH-60 },
  { walls: [
    { x: 40, y: 140, w: 200, h: 14 },
    { x: 120, y: 260, w: 200, h: 14 }
  ], animal: 2, homeX: CW/2, homeY: 50, homeR: 28, startX: 50, startY: CH-60 },
  { walls: [
    { x: 0, y: 160, w: 220, h: 14 },
    { x: 140, y: 240, w: 220, h: 14 },
    { x: 60, y: 320, w: 240, h: 14 }
  ], animal: 3, homeX: CW-50, homeY: 50, homeR: 28, startX: 50, startY: CH-60 }
];

let levelIdx = 0;
let ballX, ballY, ballVX, ballVY;
const BALL_R = 18;
const FRICTION = 0.97;
const ACCEL = 0.4;
let tiltX = 0, tiltY = 0;
let sensorEnabled = false;
let useMouse = false;
let goalReached = false;
let foundAnimals = [];
let animFrame = null;
let frameCount = 0;

// センサー許可
async function requestSensor() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') {
        enableSensor();
        document.getElementById('permission-btn').style.display = 'none';
      }
    } catch(e) {
      console.log('Sensor permission denied', e);
      enableMouseFallback();
    }
  } else {
    enableSensor();
  }
}

function enableSensor() {
  sensorEnabled = true;
  window.addEventListener('deviceorientation', (e) => {
    // gamma = 左右傾き (-90~90), beta = 前後傾き (-180~180)
    tiltX = (e.gamma || 0) / 90; // -1 ~ 1
    tiltY = ((e.beta || 0) - 30) / 90; // 30度を中立に
    tiltX = Math.max(-1, Math.min(1, tiltX));
    tiltY = Math.max(-1, Math.min(1, tiltY));
  });
}

function enableMouseFallback() {
  useMouse = true;
  document.getElementById('msg').textContent = 'ドラッグで うごかせるよ！';

  let dragging = false;
  canvas.addEventListener('mousedown', (e) => { dragging = true; updateMouse(e); });
  canvas.addEventListener('mousemove', (e) => { if (dragging) updateMouse(e); });
  canvas.addEventListener('mouseup', () => { dragging = false; tiltX = 0; tiltY = 0; });

  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; updateTouch(e); }, {passive:false});
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (dragging) updateTouch(e); }, {passive:false});
  canvas.addEventListener('touchend', () => { dragging = false; tiltX = 0; tiltY = 0; });

  function updateMouse(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * 2 - 1;
    const my = (e.clientY - rect.top) / rect.height * 2 - 1;
    tiltX = mx * 0.6;
    tiltY = my * 0.6;
  }
  function updateTouch(e) {
    const t = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    const mx = (t.clientX - rect.left) / rect.width * 2 - 1;
    const my = (t.clientY - rect.top) / rect.height * 2 - 1;
    tiltX = mx * 0.6;
    tiltY = my * 0.6;
  }
}

// 初期化チェック
function initSensor() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS: ボタンで許可を求める
    const btn = document.getElementById('permission-btn');
    btn.style.display = 'block';
    btn.addEventListener('click', requestSensor);
    enableMouseFallback(); // タッチも使えるように
  } else if ('DeviceOrientationEvent' in window) {
    // Android等
    enableSensor();
    // テスト: 1秒後にデータが来なければマウスフォールバック
    setTimeout(() => {
      if (!sensorEnabled || (tiltX === 0 && tiltY === 0)) {
        enableMouseFallback();
      }
    }, 1500);
  } else {
    enableMouseFallback();
  }
}

function startLevel() {
  goalReached = false;
  const lv = LEVELS[levelIdx];
  ballX = lv.startX;
  ballY = lv.startY;
  ballVX = 0;
  ballVY = 0;

  document.getElementById('level-label').textContent =
    'レベル ' + (levelIdx + 1) + ' / ' + LEVELS.length;
  updateScore();

  if (!animFrame) gameLoop();
}

function updateScore() {
  const icons = document.getElementById('found-icons');
  icons.textContent = foundAnimals.join('');
  document.getElementById('remain-label').textContent =
    'あと ' + (LEVELS.length - foundAnimals.length);
}

function gameLoop() {
  if (goalReached) return;
  frameCount++;

  // 物理演算
  ballVX += tiltX * ACCEL;
  ballVY += tiltY * ACCEL;
  ballVX *= FRICTION;
  ballVY *= FRICTION;

  ballX += ballVX;
  ballY += ballVY;

  // 壁との衝突
  const lv = LEVELS[levelIdx];
  for (const w of lv.walls) {
    // 矩形との衝突判定
    const closestX = Math.max(w.x, Math.min(ballX, w.x + w.w));
    const closestY = Math.max(w.y, Math.min(ballY, w.y + w.h));
    const dx = ballX - closestX;
    const dy = ballY - closestY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < BALL_R) {
      const overlap = BALL_R - dist;
      if (dist > 0) {
        ballX += (dx / dist) * overlap;
        ballY += (dy / dist) * overlap;
      }
      // 反射
      if (Math.abs(dx) > Math.abs(dy)) {
        ballVX = -ballVX * 0.5;
      } else {
        ballVY = -ballVY * 0.5;
      }
    }
  }

  // 画面端
  if (ballX < BALL_R) { ballX = BALL_R; ballVX = Math.abs(ballVX) * 0.5; }
  if (ballX > CW - BALL_R) { ballX = CW - BALL_R; ballVX = -Math.abs(ballVX) * 0.5; }
  if (ballY < BALL_R) { ballY = BALL_R; ballVY = Math.abs(ballVY) * 0.5; }
  if (ballY > CH - BALL_R) { ballY = CH - BALL_R; ballVY = -Math.abs(ballVY) * 0.5; }

  // ゴール判定
  const gdx = ballX - lv.homeX;
  const gdy = ballY - lv.homeY;
  if (Math.sqrt(gdx*gdx + gdy*gdy) < lv.homeR) {
    onGoal();
    return;
  }

  draw();
  animFrame = requestAnimationFrame(gameLoop);
}

function draw() {
  const lv = LEVELS[levelIdx];
  ctx.clearRect(0, 0, CW, CH);

  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, 0, CH);
  bgGrad.addColorStop(0, '#c8eaff');
  bgGrad.addColorStop(0.5, '#d8f0d0');
  bgGrad.addColorStop(1, '#a8d890');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, CW, CH);

  // 雲
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const cloudOff = (frameCount * 0.2) % (CW + 100) - 50;
  ctx.beginPath(); ctx.ellipse(cloudOff, 30, 30, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cloudOff - 15, 34, 20, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cloudOff + 18, 34, 22, 11, 0, 0, Math.PI*2); ctx.fill();

  // おうち（ゴール）
  const hx = lv.homeX, hy = lv.homeY, hr = lv.homeR;
  // 家の壁
  ctx.fillStyle = '#ffe8c8';
  ctx.fillRect(hx - hr, hy - hr*0.4, hr*2, hr*1.4);
  ctx.strokeStyle = '#d0a878';
  ctx.lineWidth = 2;
  ctx.strokeRect(hx - hr, hy - hr*0.4, hr*2, hr*1.4);
  // 屋根
  ctx.fillStyle = '#d07040';
  ctx.beginPath();
  ctx.moveTo(hx - hr - 6, hy - hr*0.4);
  ctx.lineTo(hx, hy - hr*1.2);
  ctx.lineTo(hx + hr + 6, hy - hr*0.4);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#a05030';
  ctx.stroke();
  // ドア
  ctx.fillStyle = '#c49a60';
  ctx.fillRect(hx - 8, hy + hr*0.2, 16, hr*0.7);
  // 窓
  ctx.fillStyle = '#a0d8f0';
  ctx.fillRect(hx - hr*0.6, hy - hr*0.1, 12, 10);
  ctx.fillRect(hx + hr*0.2, hy - hr*0.1, 12, 10);
  // 「おうち」ラベル
  ctx.font = '10px "Zen Maru Gothic",sans-serif';
  ctx.fillStyle = '#8a6a40';
  ctx.textAlign = 'center';
  ctx.fillText('おうち', hx, hy + hr + 16);

  // 壁（障害物）
  for (const w of lv.walls) {
    // レンガ風
    ctx.fillStyle = '#c8a878';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = '#a08858';
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
    // レンガ線
    const brickW = 24;
    for (let bx = w.x; bx < w.x + w.w; bx += brickW) {
      ctx.beginPath();
      ctx.moveTo(bx, w.y);
      ctx.lineTo(bx, w.y + w.h);
      ctx.strokeStyle = 'rgba(160,136,88,0.4)';
      ctx.stroke();
    }
  }

  // 動物ボール
  const bounceY = Math.sin(frameCount * 0.1) * 2;
  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(ballX, ballY + BALL_R + 6, BALL_R * 0.8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // 白い背景円
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.arc(ballX, ballY + bounceY, BALL_R + 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,160,120,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 絵文字
  ctx.font = (BALL_R * 2.5) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(ANIMALS[lv.animal], ballX, ballY + bounceY);

  // スタート地点マーク
  ctx.font = '10px "Zen Maru Gothic",sans-serif';
  ctx.fillStyle = 'rgba(100,160,80,0.4)';
  ctx.textAlign = 'center';
  ctx.fillText('スタート', lv.startX, lv.startY + BALL_R + 12);

  // 傾きインジケーター
  ctx.fillStyle = 'rgba(100,180,60,0.3)';
  ctx.beginPath();
  ctx.arc(CW - 30, CH - 30, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(60,140,30,0.6)';
  ctx.beginPath();
  ctx.arc(CW - 30 + tiltX * 10, CH - 30 + tiltY * 10, 5, 0, Math.PI * 2);
  ctx.fill();
}

function onGoal() {
  goalReached = true;
  animFrame = null;
  const lv = LEVELS[levelIdx];
  foundAnimals.push(ANIMALS[lv.animal]);
  updateScore();

  document.getElementById('msg').textContent = '🎉 おうちに ついたよ！';

  doFlash();
  const rect = canvas.getBoundingClientRect();
  const scaleX = rect.width / CW;
  const scaleY = rect.height / CH;
  spawnSparkles(rect.left + lv.homeX * scaleX, rect.top + lv.homeY * scaleY);

  levelIdx++;
  if (levelIdx >= LEVELS.length) {
    setTimeout(showFinalResult, 1500);
  } else {
    setTimeout(() => {
      document.getElementById('msg').textContent = 'つぎの レベル！';
      setTimeout(() => startLevel(), 800);
    }, 1500);
  }
}

function showFinalResult() {
  document.getElementById('res-title').textContent = '⭐ よくできたね！ ⭐';
  document.getElementById('res-found').textContent = foundAnimals.join('');
  document.getElementById('res-detail').textContent = 'みんな おうちに かえれたよ！';
  document.getElementById('result-overlay').classList.add('show');
}

function resetGame() {
  levelIdx = 0;
  foundAnimals = [];
  goalReached = false;
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('msg').textContent = 'スマホを かたむけてね！';
  startLevel();
}

document.getElementById('restartBtn').addEventListener('click', resetGame);

// ======== キラキラ ========
const spCanvas = document.getElementById('sparkle-canvas');
const spCtx = spCanvas.getContext('2d');
let sparkles = [];
let sparkleAnim = null;

function resizeSparkleCanvas() {
  spCanvas.width = window.innerWidth;
  spCanvas.height = window.innerHeight;
}
resizeSparkleCanvas();
window.addEventListener('resize', resizeSparkleCanvas);

const SPARKLE_COLORS = ['#ffee44','#ff88cc','#88eeff','#aaffaa','#ffaa44','#ffffff','#88ff88'];

function spawnSparkles(cx, cy) {
  for (let i = 0; i < 25; i++) {
    const angle = Math.random() * Math.PI * 2, speed = 2 + Math.random() * 5;
    sparkles.push({
      x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
      r: 3 + Math.random() * 4, life: 1, decay: 0.015 + Math.random() * 0.015,
      color: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
      star: Math.random() < 0.5, rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.15
    });
  }
  if (!sparkleAnim) sparkleLoop();
}

function sparkleLoop() {
  spCtx.clearRect(0, 0, spCanvas.width, spCanvas.height);
  sparkles = sparkles.filter(p => p.life > 0);
  for (const p of sparkles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.99;
    p.life -= p.decay; p.rot += p.rotSpeed;
    if (p.life <= 0) continue;
    spCtx.save(); spCtx.globalAlpha = p.life;
    spCtx.translate(p.x, p.y); spCtx.rotate(p.rot);
    if (p.star) {
      spCtx.fillStyle = p.color; spCtx.beginPath();
      for (let i = 0; i < 4; i++) { const a = (Math.PI / 2) * i;
        spCtx.lineTo(Math.cos(a - 0.15) * p.r * 0.3, Math.sin(a - 0.15) * p.r * 0.3);
        spCtx.lineTo(Math.cos(a) * p.r * 1.5, Math.sin(a) * p.r * 1.5); }
      spCtx.closePath(); spCtx.fill();
    } else {
      spCtx.fillStyle = p.color;
      spCtx.beginPath(); spCtx.arc(0, 0, p.r, 0, Math.PI * 2); spCtx.fill();
    }
    spCtx.restore();
  }
  if (sparkles.length > 0) { sparkleAnim = requestAnimationFrame(sparkleLoop); }
  else { sparkleAnim = null; }
}

function doFlash() {
  const fl = document.getElementById('flash-overlay');
  fl.classList.remove('flash'); void fl.offsetWidth; fl.classList.add('flash');
}

// ======== 開始 ========
initSensor();
startLevel();

// ======== Service Worker 登録 ========
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
