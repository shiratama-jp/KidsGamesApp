<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>にこにこどうぶつらんど</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#fde68a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="どうぶつらんど">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #c8eaff;
            --bg-grass: #a8d890;
            --text-main: #4a8a30;
            --card-yellow: #fff9c4;
            --card-blue: #e3f2fd;
            --card-pink: #fce4ec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--bg-sky);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 草原の背景 */
        .meadow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to bottom, #d8f0d0 0%, var(--bg-grass) 100%);
            z-index: -1;
            border-radius: 50% 50% 0 0 / 10% 10% 0 0;
            transform: scaleX(1.2);
        }

        /* 雲のアニメーション */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.7;
            animation: move-cloud linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-1 { width: 100px; height: 40px; top: 10%; left: -150px; animation-duration: 40s; }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 45px; }

        .cloud-2 { width: 120px; height: 45px; top: 25%; left: -180px; animation-duration: 55s; animation-delay: -10s; }
        .cloud-2::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud-2::after { width: 50px; height: 50px; top: -20px; left: 55px; }

        @keyframes move-cloud {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* ヘッダー */
        header {
            margin-top: 5vh;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(28px, 8vw, 42px);
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 3px 3px 0 white;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 700;
            color: #6a9a50;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        /* メニューグリッド */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            margin-top: 20px;
        }

        .menu-item {
            text-decoration: none;
            background: white;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 4px solid white;
        }

        .menu-item:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
        }

        .menu-item.yellow { background: var(--card-yellow); border-color: #fdd835; }
        .menu-item.blue { background: var(--card-blue); border-color: #64b5f6; }
        .menu-item.pink { background: var(--card-pink); border-color: #f06292; }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
        }

        .item-title {
            font-size: 16px;
            font-weight: 900;
            color: #444;
            text-align: center;
            line-height: 1.2;
        }

        /* フッター */
        footer {
            margin-top: auto;
            padding: 16px 0 20px;
            font-size: 12px;
            color: #777;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .bgm-btn {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 18px;
            font-weight: 900;
            color: #444;
            background: white;
            border: 3px solid #fdd835;
            border-radius: 30px;
            padding: 8px 22px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.08);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .bgm-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.08);
        }

        .bgm-credit {
            font-size: 11px;
            color: #888;
        }

        .copyright {
            font-size: 11px;
            color: #aaa;
        }

    </style>
</head>
<body>
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
    </div>
    <div class="meadow"></div>

    <header>
        <h1>にこにこ<br>どうぶつらんど</h1>
        <p class="subtitle">あそびたいのを えらんでね！</p>
    </header>

    <div class="menu-grid">
        <a href="animal-guess.html" class="menu-item yellow">
            <span class="emoji">🙈</span>
            <span class="item-title">かくれんぼ<br>どうぶつ</span>
        </a>
        <a href="doubutsu-irukana.html" class="menu-item blue">
            <span class="emoji">🔎</span>
            <span class="item-title">どうぶつ<br>いるかな？</span>
        </a>
        <a href="doubutsu-puzzle.html" class="menu-item pink">
            <span class="emoji">🧩</span>
            <span class="item-title">どうぶつ<br>ぱずる</span>
        </a>
        <!-- おうちに かえろう も追加しておく -->
        <a href="ouchi-ni-kaerou.html" class="menu-item" style="background: #e8f5e9; border-color: #81c784;">
            <span class="emoji">🏠</span>
            <span class="item-title">おうちに<br>かえろう</span>
        </a>
    </div>

    <footer>
        <button id="bgm-toggle" class="bgm-btn" type="button">🎵▶️</button>
        <p class="bgm-credit">BGM: 甘茶の音楽工房</p>
        <p class="copyright">&copy; にこにこどうぶつらんど</p>
        <p class="copyright">Ver.260428-1.00</p>
    </footer>

    <script src="./audio-manager.js"></script>
    <script>
        // ゲーム選択時の音
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const url = item.getAttribute('href');
                AudioManager.playPoyon();
                setTimeout(() => {
                    location.href = url;
                }, 200); // 0.2秒待ってから移動
            });
        });

        // BGMトグル: 押したらON/OFF切替、アイコンも更新
        const bgmBtn = document.getElementById('bgm-toggle');
        function refreshBgmIcon() {
            bgmBtn.textContent = AudioManager.isPlaying() ? '🎵⏸️' : '🎵▶️';
        }
        refreshBgmIcon();
        bgmBtn.addEventListener('click', () => {
            AudioManager.toggleBGM();
            refreshBgmIcon();
        });

        // autoResumeBGM()が自動再生した場合もアイコンを同期
        AudioManager.initBGM();
        AudioManager.bgm.addEventListener('play', refreshBgmIcon);
        AudioManager.bgm.addEventListener('pause', refreshBgmIcon);

        // Service Worker 登録
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
