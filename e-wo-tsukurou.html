<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えを つくろう</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #e8f4f8;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.container {
  text-align: center;
  padding: 16px;
  max-width: 440px;
  width: 100%;
}
h1 {
  font-size: 26px; font-weight: 900; color: #2a7ab5;
  margin-bottom: 4px; letter-spacing: 2px;
}
.subtitle {
  font-size: 13px; color: #6aaac0; margin-bottom: 16px;
}

/* スコア */
#score-area {
  background: rgba(255,255,255,0.8);
  border-radius: 12px; padding: 6px 14px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  gap: 10px; min-height: 38px;
  box-shadow: 0 2px 8px rgba(40,120,180,0.1);
}
#found-icons { font-size: 22px; letter-spacing: 2px; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; }
#found-icons .icon { display: inline-block; animation: icon-pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes icon-pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
#remain-label { font-size: 15px; font-weight: 900; color: #5a90b0; white-space: nowrap; }

/* お題ラベル */
#scene-label {
  font-size: 18px; font-weight: 900; color: #2a7ab5; margin-bottom: 8px;
}

/* 絵のキャンバス */
#scene-wrap {
  position: relative;
  width: min(360px, 90vw);
  height: min(240px, 60vw);
  margin: 0 auto 12px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(40,120,180,0.15);
  border: 3px solid rgba(255,255,255,0.6);
}
#scene-canvas {
  width: 100%; height: 100%;
  border-radius: 17px;
}

/* 問いかけ */
#question {
  font-size: 16px; font-weight: 700; color: #5a90b0;
  margin-bottom: 10px; min-height: 24px;
}

/* 選択肢 */
#choices {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  margin-bottom: 14px;
}
.choice-btn {
  width: 72px; height: 72px;
  border: 3px solid #c0dae8; border-radius: 16px;
  background: #fff; cursor: pointer;
  transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  font-family: 'Zen Maru Gothic', sans-serif;
}
.choice-btn .emoji { font-size: 34px; line-height: 1; }
.choice-btn .label { font-size: 10px; font-weight: 700; color: #6a9ab5; }
.choice-btn:hover:not(:disabled) { border-color: #ffcc44; transform: scale(1.08); box-shadow: 0 4px 12px rgba(255,200,50,0.3); }
.choice-btn:disabled { opacity: 0.35; cursor: default; transform: none; }
.choice-btn.wrong-shake { animation: btn-shake 0.5s ease-in-out; }
@keyframes btn-shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

/* 結果テキスト */
#result {
  font-size: 18px; font-weight: 700; min-height: 28px; margin-bottom: 10px;
}
#result.correct { color: #4aaa50; }
#result.wrong { color: #e8aa00; }

.game-btn {
  padding: 10px 28px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px; font-weight: 900; cursor: pointer;
  border: 3px solid #4a9ac0; border-radius: 12px;
  background: rgba(80,170,220,0.85); color: #fff;
  box-shadow: 0 4px 12px rgba(60,140,200,0.3);
  transition: all 0.2s; visibility: hidden;
}
.game-btn:hover { background: rgba(60,150,200,0.95); transform: scale(1.04); }
.game-btn.visible { visibility: visible; }

/* 結果画面 */
#result-overlay {
  display: none; position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(232,244,248,0.95);
  z-index: 100; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
#result-overlay.show { display: flex; }
#result-overlay .big { font-size: 28px; font-weight: 900; color: #2a7ab5; }
#result-overlay .found-list { font-size: 32px; letter-spacing: 6px; text-align: center; margin: 8px 0; }
#result-overlay .detail { font-size: 16px; font-weight: 700; color: #5a90b0; }
.restart-btn {
  margin-top: 12px; padding: 10px 32px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 18px; font-weight: 900; cursor: pointer;
  border: 3px solid #4a9ac0; border-radius: 60px;
  background: rgba(80,170,220,0.85); color: #fff;
  box-shadow: 0 4px 0 #3080a0; transition: all 0.2s;
}
.restart-btn:hover { background: rgba(60,150,200,0.95); }

/* フラッシュ */
#flash-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 90; opacity: 0;
}
#flash-overlay.flash { animation: flash-bang 0.6s ease-out forwards; }
@keyframes flash-bang {
  0% { opacity:0; background: radial-gradient(circle, rgba(255,255,200,0.9), rgba(255,240,100,0.3)); }
  15% { opacity:1; } 100% { opacity:0; }
}
#sparkle-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 91;
}
</style>
</head>
<body>

<div class="container">
  <h1>🎨 えを つくろう 🎨</h1>
  <p class="subtitle">えに あう ものを えらぼう！</p>

  <div id="score-area">
    <div id="found-icons"></div>
    <div id="remain-label">あと 2</div>
  </div>

  <div id="scene-label"></div>

  <div id="scene-wrap">
    <canvas id="scene-canvas" width="360" height="240"></canvas>
  </div>

  <div id="question"></div>

  <div id="choices"></div>

  <div id="result"></div>
  <button class="game-btn" id="nextBtn">つぎの え →</button>
</div>

<div id="result-overlay">
  <div class="big" id="res-title"></div>
  <div class="found-list" id="res-found"></div>
  <div class="detail" id="res-detail"></div>
  <button class="restart-btn" id="restartBtn">もういっかい！</button>
</div>

<div id="flash-overlay"></div>
<canvas id="sparkle-canvas"></canvas>

<script>
const SC = document.getElementById('scene-canvas');
const SCtx = SC.getContext('2d');
const SW = 360, SH = 240;

// ======== 場面定義 ========
const SCENES = [
  {
    id: 'umi',
    title: '🌊 うみ の え',
    question: 'うみ に なにが いるかな？',
    answer: { emoji: '⛵', label: 'ふね' },
    decoys: [
      { emoji: '🚗', label: 'くるま' },
      { emoji: '🍎', label: 'りんご' },
      { emoji: '🎸', label: 'ギター' }
    ],
    drawBg: function(ctx) {
      // 空
      const skyGrad = ctx.createLinearGradient(0, 0, 0, SH * 0.55);
      skyGrad.addColorStop(0, '#87CEEB');
      skyGrad.addColorStop(1, '#c8eaff');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, SW, SH * 0.55);

      // 太陽
      ctx.fillStyle = '#ffe060';
      ctx.beginPath(); ctx.arc(300, 45, 28, 0, Math.PI*2); ctx.fill();
      // 光線
      ctx.strokeStyle = '#ffe060'; ctx.lineWidth = 2.5;
      for(let i = 0; i < 8; i++){
        const a = i * Math.PI/4;
        ctx.beginPath();
        ctx.moveTo(300+Math.cos(a)*32, 45+Math.sin(a)*32);
        ctx.lineTo(300+Math.cos(a)*42, 45+Math.sin(a)*42);
        ctx.stroke();
      }

      // 雲
      drawCloud(ctx, 70, 40, 1);
      drawCloud(ctx, 200, 60, 0.7);

      // 海
      const seaGrad = ctx.createLinearGradient(0, SH*0.5, 0, SH);
      seaGrad.addColorStop(0, '#4a9fd8');
      seaGrad.addColorStop(1, '#2a6fa8');
      ctx.fillStyle = seaGrad;
      ctx.fillRect(0, SH*0.5, SW, SH*0.5);

      // 波
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 2;
      for(let row = 0; row < 4; row++){
        ctx.beginPath();
        const baseY = SH*0.55 + row * 22;
        for(let x = -10; x < SW+20; x += 30){
          ctx.quadraticCurveTo(x+7, baseY-6, x+15, baseY);
          ctx.quadraticCurveTo(x+22, baseY+6, x+30, baseY);
        }
        ctx.stroke();
      }

      // 砂浜のかけら（下端）
      ctx.fillStyle = '#f5deb3';
      ctx.beginPath();
      ctx.moveTo(0, SH);
      ctx.quadraticCurveTo(SW*0.3, SH-12, SW*0.5, SH);
      ctx.lineTo(0, SH);
      ctx.fill();
    },
    drawAnswer: function(ctx) {
      // 船を海に配置
      ctx.font = '52px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⛵', SW*0.45, SH*0.52);
    }
  },
  {
    id: 'yozora',
    title: '🌙 よぞら の え',
    question: 'よぞら に なにが あるかな？',
    answer: { emoji: '⭐', label: 'ほし' },
    decoys: [
      { emoji: '🌻', label: 'ひまわり' },
      { emoji: '🐟', label: 'さかな' },
      { emoji: '🔑', label: 'かぎ' }
    ],
    drawBg: function(ctx) {
      // 夜空グラデ
      const skyGrad = ctx.createLinearGradient(0, 0, 0, SH);
      skyGrad.addColorStop(0, '#0a1628');
      skyGrad.addColorStop(0.5, '#1a2a4a');
      skyGrad.addColorStop(1, '#2a3a5a');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, SW, SH);

      // 月
      ctx.fillStyle = '#fffacd';
      ctx.beginPath(); ctx.arc(280, 55, 30, 0, Math.PI*2); ctx.fill();
      // 月の影
      ctx.fillStyle = '#1a2a4a';
      ctx.beginPath(); ctx.arc(292, 48, 26, 0, Math.PI*2); ctx.fill();
      // 月のグロー
      ctx.save();
      ctx.fillStyle = 'rgba(255,250,200,0.08)';
      ctx.beginPath(); ctx.arc(280, 55, 50, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 小さな星をちょっとだけ（メインの星は正解で置く）
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      [[40,30],[120,70],[320,100],[60,140],[250,160],[180,25]].forEach(([x,y]) => {
        ctx.beginPath(); ctx.arc(x, y, 1.2, 0, Math.PI*2); ctx.fill();
      });

      // 地面（丘）
      ctx.fillStyle = '#1a2820';
      ctx.beginPath();
      ctx.moveTo(0, SH);
      ctx.quadraticCurveTo(SW*0.25, SH-40, SW*0.5, SH-25);
      ctx.quadraticCurveTo(SW*0.75, SH-10, SW, SH-30);
      ctx.lineTo(SW, SH); ctx.lineTo(0, SH);
      ctx.fill();

      // 木のシルエット
      drawTreeSilhouette(ctx, 60, SH-40);
      drawTreeSilhouette(ctx, 300, SH-32);

      // 家のシルエット
      ctx.fillStyle = '#0d1a14';
      ctx.fillRect(150, SH-55, 40, 30);
      ctx.beginPath();
      ctx.moveTo(145, SH-55); ctx.lineTo(170, SH-72); ctx.lineTo(195, SH-55);
      ctx.fill();
      // 窓の灯り
      ctx.fillStyle = '#ffdd66';
      ctx.fillRect(158, SH-48, 10, 10);
      ctx.fillRect(173, SH-48, 10, 10);
    },
    drawAnswer: function(ctx) {
      // 大きな星を複数配置
      ctx.font = '32px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⭐', 80, 60);
      ctx.font = '24px serif';
      ctx.fillText('⭐', 180, 40);
      ctx.font = '28px serif';
      ctx.fillText('⭐', 140, 100);
      ctx.font = '20px serif';
      ctx.fillText('⭐', 240, 80);
      ctx.font = '36px serif';
      ctx.fillText('⭐', 50, 130);
    }
  }
];

function drawCloud(ctx, x, y, scale){
  ctx.save();
  ctx.translate(x, y); ctx.scale(scale, scale);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.ellipse(0, 0, 30, 18, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-20, 4, 22, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(20, 4, 24, 15, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(8, -8, 18, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawTreeSilhouette(ctx, x, y){
  ctx.fillStyle = '#0d1a14';
  ctx.fillRect(x-3, y, 6, 20);
  ctx.beginPath();
  ctx.moveTo(x-18, y+2);
  ctx.lineTo(x, y-28);
  ctx.lineTo(x+18, y+2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-14, y-10);
  ctx.lineTo(x, y-36);
  ctx.lineTo(x+14, y-10);
  ctx.fill();
}

// ======== ゲームロジック ========
const TOTAL = SCENES.length;
let currentScene = null;
let sceneIndex = 0;
let round = 0;
let foundItems = [];
let answered = false;
let autoNextTimer = null;

// シャッフル用
let sceneOrder = [];

function shuffleScenes(){
  sceneOrder = [...Array(SCENES.length).keys()];
  for(let i = sceneOrder.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [sceneOrder[i], sceneOrder[j]] = [sceneOrder[j], sceneOrder[i]];
  }
}

function updateScore(){
  const icons = document.getElementById('found-icons');
  icons.innerHTML = '';
  for(const e of foundItems){
    const sp = document.createElement('span');
    sp.className = 'icon'; sp.textContent = e;
    icons.appendChild(sp);
  }
  document.getElementById('remain-label').textContent = 'あと ' + (TOTAL - round);
}

function drawScene(withAnswer){
  SCtx.clearRect(0, 0, SW, SH);
  currentScene.drawBg(SCtx);
  if(withAnswer){
    currentScene.drawAnswer(SCtx);
  }
}

function startRound(){
  if(autoNextTimer){ clearTimeout(autoNextTimer); autoNextTimer = null; }
  answered = false;

  currentScene = SCENES[sceneOrder[sceneIndex]];
  sceneIndex++;

  document.getElementById('scene-label').textContent = currentScene.title;
  document.getElementById('question').textContent = currentScene.question;
  document.getElementById('result').textContent = '';
  document.getElementById('result').className = '';
  document.getElementById('nextBtn').classList.remove('visible');

  // 背景（正解なし）
  drawScene(false);

  // 選択肢生成
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  const allChoices = [
    { ...currentScene.answer, correct: true },
    ...currentScene.decoys.map(d => ({ ...d, correct: false }))
  ];
  // シャッフル
  for(let i = allChoices.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [allChoices[i], allChoices[j]] = [allChoices[j], allChoices[i]];
  }

  for(const ch of allChoices){
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '<span class="emoji">' + ch.emoji + '</span><span class="label">' + ch.label + '</span>';
    btn.addEventListener('click', () => tryChoice(btn, ch));
    choicesDiv.appendChild(btn);
  }

  updateScore();
}

function tryChoice(btn, choice){
  if(answered) return;

  if(choice.correct){
    answered = true;
    round++;
    foundItems.push(choice.emoji);

    // 正解を絵に追加！
    drawScene(true);

    document.getElementById('result').textContent = '⭕ ' + choice.label + ' だね！';
    document.getElementById('result').className = 'correct';

    // ボタン全無効化
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

    updateScore();
    doFlash();

    // キラキラ
    const rect = document.getElementById('scene-wrap').getBoundingClientRect();
    spawnSparkles(rect.left + rect.width/2, rect.top + rect.height/2);
    setTimeout(() => spawnSparkles(rect.left + rect.width/2, rect.top + rect.height/2), 200);

    if(round >= TOTAL){
      setTimeout(showFinalResult, 1500);
    } else {
      document.getElementById('nextBtn').classList.add('visible');
      autoNextTimer = setTimeout(() => goNext(), 7000);
    }
  } else {
    // 間違い
    btn.classList.remove('wrong-shake');
    void btn.offsetWidth;
    btn.classList.add('wrong-shake');
    btn.disabled = true;

    document.getElementById('result').textContent = 'ちがうよ〜';
    document.getElementById('result').className = 'wrong';
    setTimeout(() => {
      if(document.getElementById('result').textContent === 'ちがうよ〜')
        document.getElementById('result').textContent = '';
    }, 1200);
  }
}

function goNext(){
  if(autoNextTimer){ clearTimeout(autoNextTimer); autoNextTimer = null; }
  startRound();
}

function showFinalResult(){
  const overlay = document.getElementById('result-overlay');
  document.getElementById('res-title').textContent = '⭐ よくできたね！ ⭐';
  document.getElementById('res-found').textContent = foundItems.join('');
  document.getElementById('res-detail').textContent = 'えが かんせい したよ！';
  overlay.classList.add('show');
}

function resetGame(){
  round = 0; sceneIndex = 0; foundItems = [];
  if(autoNextTimer){ clearTimeout(autoNextTimer); autoNextTimer = null; }
  document.getElementById('result-overlay').classList.remove('show');
  shuffleScenes();
  updateScore();
  startRound();
}

document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('restartBtn').addEventListener('click', resetGame);

// ======== キラキラパーティクル ========
const spCanvas = document.getElementById('sparkle-canvas');
const spCtx = spCanvas.getContext('2d');
let sparkles = [];
let sparkleAnim = null;

function resizeSparkleCanvas(){
  spCanvas.width = window.innerWidth;
  spCanvas.height = window.innerHeight;
}
resizeSparkleCanvas();
window.addEventListener('resize', resizeSparkleCanvas);

const SPARKLE_COLORS = ['#ffee44','#ff88cc','#88eeff','#aaffaa','#ffaa44','#ffffff','#ff6688'];

function spawnSparkles(cx, cy){
  for(let i = 0; i < 30; i++){
    const angle = Math.random()*Math.PI*2, speed = 2+Math.random()*6;
    sparkles.push({
      x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
      r:3+Math.random()*5, life:1, decay:0.012+Math.random()*0.015,
      color:SPARKLE_COLORS[Math.floor(Math.random()*SPARKLE_COLORS.length)],
      star:Math.random()<0.5, rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.15
    });
  }
  if(!sparkleAnim) sparkleLoop();
}

function sparkleLoop(){
  spCtx.clearRect(0, 0, spCanvas.width, spCanvas.height);
  sparkles = sparkles.filter(p => p.life > 0);
  for(const p of sparkles){
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.99;
    p.life -= p.decay; p.rot += p.rotSpeed;
    if(p.life <= 0) continue;
    spCtx.save(); spCtx.globalAlpha = p.life;
    spCtx.translate(p.x, p.y); spCtx.rotate(p.rot);
    if(p.star){
      spCtx.fillStyle = p.color; spCtx.beginPath();
      for(let i=0;i<4;i++){
        const a=(Math.PI/2)*i;
        spCtx.lineTo(Math.cos(a-0.15)*p.r*0.3, Math.sin(a-0.15)*p.r*0.3);
        spCtx.lineTo(Math.cos(a)*p.r*1.5, Math.sin(a)*p.r*1.5);
      }
      spCtx.closePath(); spCtx.fill();
    } else {
      spCtx.fillStyle = p.color;
      spCtx.beginPath(); spCtx.arc(0,0,p.r,0,Math.PI*2); spCtx.fill();
    }
    spCtx.restore();
  }
  if(sparkles.length > 0){ sparkleAnim = requestAnimationFrame(sparkleLoop); }
  else { sparkleAnim = null; }
}

function doFlash(){
  const fl = document.getElementById('flash-overlay');
  fl.classList.remove('flash'); void fl.offsetWidth; fl.classList.add('flash');
}

// ======== 開始 ========
shuffleScenes();
startRound();
</script>
</body>
</html>
