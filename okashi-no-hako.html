<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おかしの はこ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #fff0e8;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.container {
  text-align: center;
  padding: 14px;
  max-width: 440px;
  width: 100%;
}
h1 {
  font-size: 24px; font-weight: 900; color: #c06020;
  margin-bottom: 4px; letter-spacing: 2px;
}
.subtitle {
  font-size: 12px; color: #c09070; margin-bottom: 10px;
}

#score-area {
  background: rgba(255,255,255,0.8);
  border-radius: 12px; padding: 6px 14px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; min-height: 36px;
  box-shadow: 0 2px 8px rgba(180,120,60,0.1);
}
#found-icons { font-size: 22px; letter-spacing: 2px; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; }
#found-icons .icon { display: inline-block; animation: icon-pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes icon-pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

#level-label {
  font-size: 14px; font-weight: 900; color: #c09060;
  margin-bottom: 4px;
}

#msg {
  font-size: 18px; font-weight: 900; min-height: 30px;
  margin-bottom: 10px; color: #c06020;
  transition: opacity 0.2s;
}
#msg.correct { color: #4aaa50; }
#msg.wrong { color: #e8aa00; }

/* 箱エリア */
#box-area {
  position: relative;
  width: 100%;
  height: 160px;
  margin-bottom: 12px;
}
.box {
  position: absolute;
  width: 72px; height: 80px;
  transition: left 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: default;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  user-select: none;
}
.box.clickable {
  cursor: pointer;
}
.box.clickable:hover .box-body {
  transform: scale(1.06);
  border-color: #ffcc44;
}
.box-body {
  width: 72px; height: 64px;
  background: linear-gradient(180deg, #e8a050, #c87830);
  border: 3px solid #a06020;
  border-radius: 8px 8px 4px 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  position: relative;
  transition: all 0.2s;
  box-shadow: 0 3px 8px rgba(120,60,20,0.2);
}
.box-lid {
  width: 78px; height: 16px;
  background: linear-gradient(180deg, #d08040, #b06828);
  border: 3px solid #a06020;
  border-radius: 6px 6px 0 0;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: center bottom;
}
.box-mark {
  font-size: 28px;
  position: absolute;
  bottom: 4px;
  opacity: 0.8;
}
.box-treat {
  position: absolute;
  top: -10px;
  font-size: 36px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 2;
}
.box.open .box-treat {
  opacity: 1;
  top: -50px;
}

.box.open .box-lid {
  transform: rotateX(90deg);
}

.box.wrong-shake {
  animation: box-shake 0.5s ease-in-out;
}
@keyframes box-shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* 指アイコン */
#point-hint {
  font-size: 28px;
  margin-bottom: 6px;
  opacity: 0;
  transition: opacity 0.3s;
  animation: point-bounce 0.8s ease-in-out infinite;
}
#point-hint.show { opacity: 1; }
@keyframes point-bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ボタン */
.game-btn {
  padding: 10px 28px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 16px; font-weight: 900; cursor: pointer;
  border: 3px solid #c87030; border-radius: 12px;
  background: rgba(230,140,60,0.85); color: #fff;
  box-shadow: 0 4px 12px rgba(180,100,40,0.3);
  transition: all 0.2s;
}
.game-btn:hover { background: rgba(210,120,40,0.95); transform: scale(1.04); }

/* 結果画面 */
#result-overlay {
  display: none; position: fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(255,240,232,0.95);
  z-index: 100; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
}
#result-overlay.show { display: flex; }
#result-overlay .big { font-size: 28px; font-weight: 900; color: #c06020; }
#result-overlay .found-list { font-size: 28px; letter-spacing: 4px; text-align: center; margin: 8px 0; }
#result-overlay .detail { font-size: 16px; font-weight: 700; color: #b08050; }
.restart-btn {
  margin-top: 12px; padding: 10px 32px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 18px; font-weight: 900; cursor: pointer;
  border: 3px solid #c87030; border-radius: 60px;
  background: rgba(230,140,60,0.85); color: #fff;
  box-shadow: 0 4px 0 #a06020; transition: all 0.2s;
}
.restart-btn:hover { background: rgba(210,120,40,0.95); }

/* フラッシュ */
#flash-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 90; opacity: 0;
}
#flash-overlay.flash { animation: flash-bang 0.6s ease-out forwards; }
@keyframes flash-bang {
  0% { opacity:0; background: radial-gradient(circle, rgba(255,255,200,0.9), rgba(255,220,150,0.3)); }
  15% { opacity:1; } 100% { opacity:0; }
}
#sparkle-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events: none; z-index: 91;
}
</style>
</head>
<body>

<div class="container">
  <h1>🎁 おかしの はこ 🎁</h1>
  <p class="subtitle">おかしが はいった はこを おいかけよう！</p>

  <div id="score-area">
    <div id="found-icons"></div>
  </div>

  <div id="level-label"></div>
  <div id="msg"></div>

  <div id="box-area"></div>
  <div id="point-hint">👆</div>

  <button class="game-btn" id="startBtn">はじめる！</button>
</div>

<div id="result-overlay">
  <div class="big" id="res-title"></div>
  <div class="found-list" id="res-found"></div>
  <div class="detail" id="res-detail"></div>
  <button class="restart-btn" id="restartBtn">もういっかい！</button>
</div>

<div id="flash-overlay"></div>
<canvas id="sparkle-canvas"></canvas>

<script>
const TREATS = ['🍩','🍪','🍭','🧁','🍫','🍬','🎂','🍮','🍡','🍰'];
const BOX_MARKS = ['⭐','🌙','☀️','🌸','🌈'];
const CLEAR_PER_LEVEL = 2;
const MIN_BOXES = 2;
const MAX_BOXES = 5;

let level = MIN_BOXES;
let clearCount = 0;
let foundTreats = [];
let currentTreat = '';
let answerIndex = 0;
let boxOrder = [];
let phase = 'idle'; // idle, showing, shuffling, choosing, result
let boxElements = [];

function setMsg(text, cls){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = cls || '';
}

function updateLevel(){
  const progress = '🟢'.repeat(clearCount) + '⚪'.repeat(CLEAR_PER_LEVEL - clearCount);
  document.getElementById('level-label').textContent = 'はこ ' + level + 'こ  ' + progress;
}

function updateScore(){
  const icons = document.getElementById('found-icons');
  icons.innerHTML = '';
  for(const t of foundTreats){
    const sp = document.createElement('span');
    sp.className = 'icon'; sp.textContent = t;
    icons.appendChild(sp);
  }
}

function getBoxPositions(count){
  const area = document.getElementById('box-area');
  const areaW = area.offsetWidth || 400;
  const boxW = 78;
  const totalW = count * boxW + (count - 1) * 10;
  const startX = (areaW - totalW) / 2;
  const positions = [];
  for(let i = 0; i < count; i++){
    positions.push(startX + i * (boxW + 10));
  }
  return positions;
}

function createBoxes(){
  const area = document.getElementById('box-area');
  area.innerHTML = '';
  boxElements = [];
  boxOrder = Array.from({length: level}, (_, i) => i);

  const positions = getBoxPositions(level);

  for(let i = 0; i < level; i++){
    const box = document.createElement('div');
    box.className = 'box';
    box.id = 'box-' + i;
    box.style.left = positions[i] + 'px';
    box.style.top = '45px';

    box.innerHTML = `
      <div class="box-treat">${i === answerIndex ? currentTreat : ''}</div>
      <div class="box-lid"></div>
      <div class="box-body">
        <span class="box-mark">${BOX_MARKS[i]}</span>
      </div>
    `;

    box.addEventListener('click', () => pickBox(i));
    area.appendChild(box);
    boxElements.push(box);
  }
}

function positionBoxes(animated){
  const positions = getBoxPositions(level);
  for(let i = 0; i < level; i++){
    const realIndex = boxOrder[i];
    const box = document.getElementById('box-' + realIndex);
    if(!animated) box.style.transition = 'none';
    else box.style.transition = 'left 1.0s cubic-bezier(0.4, 0, 0.2, 1)';
    box.style.left = positions[i] + 'px';
  }
}

async function startRound(){
  document.getElementById('startBtn').style.display = 'none';
  currentTreat = TREATS[Math.floor(Math.random() * TREATS.length)];
  answerIndex = Math.floor(Math.random() * level);
  boxOrder = Array.from({length: level}, (_, i) => i);

  createBoxes();
  updateLevel();

  // フェーズ1: お菓子を見せる
  phase = 'showing';
  setMsg(currentTreat + ' が はいるよ！');

  await sleep(500);

  // 正解の箱を開ける
  const answerBox = document.getElementById('box-' + answerIndex);
  answerBox.classList.add('open');

  await sleep(1500);

  // 箱を閉じる
  answerBox.classList.remove('open');
  setMsg('よく みてね！');

  await sleep(600);

  // フェーズ2: シャッフル
  phase = 'shuffling';
  const shuffleCount = level <= 2 ? 3 : level <= 3 ? 4 : 5;

  for(let s = 0; s < shuffleCount; s++){
    // ランダムに2つ選んで交換
    let a = Math.floor(Math.random() * level);
    let b = Math.floor(Math.random() * level);
    while(b === a) b = Math.floor(Math.random() * level);

    // boxOrderの中で位置を入れ替え
    const posA = boxOrder.indexOf(a);
    const posB = boxOrder.indexOf(b);
    [boxOrder[posA], boxOrder[posB]] = [boxOrder[posB], boxOrder[posA]];

    positionBoxes(true);
    await sleep(1300);
  }

  // フェーズ3: 選ぶ
  phase = 'choosing';
  setMsg('どの はこかな？');
  document.getElementById('point-hint').classList.add('show');
  for(const box of boxElements){
    box.classList.add('clickable');
  }
}

function pickBox(originalIndex){
  if(phase !== 'choosing') return;
  phase = 'result';

  // 指アイコン非表示
  document.getElementById('point-hint').classList.remove('show');

  // 全箱のclickable外す
  for(const box of boxElements){
    box.classList.remove('clickable');
  }

  const box = document.getElementById('box-' + originalIndex);

  if(originalIndex === answerIndex){
    // 正解！
    box.classList.add('open');
    clearCount++;
    foundTreats.push(currentTreat);
    updateScore();
    updateLevel();

    setMsg('🎉 あたり！', 'correct');
    doFlash();
    const rect = box.getBoundingClientRect();
    spawnSparkles(rect.left + rect.width/2, rect.top);

    setTimeout(()=>{
      if(clearCount >= CLEAR_PER_LEVEL){
        // レベルクリア
        if(level >= MAX_BOXES){
          // 全クリ！
          setTimeout(showFinalResult, 800);
          return;
        }
        level++;
        clearCount = 0;
        updateLevel();
        setMsg('つぎは はこ ' + level + 'こ！');
        setTimeout(() => startRound(), 1500);
      } else {
        setTimeout(() => startRound(), 1200);
      }
    }, 1200);
  } else {
    // ハズレ
    box.classList.add('wrong-shake');
    setMsg('ちがうよ〜 もういっかい！', 'wrong');

    // 正解を見せる
    setTimeout(()=>{
      const answerBox = document.getElementById('box-' + answerIndex);
      answerBox.classList.add('open');
    }, 600);

    setTimeout(()=>{
      startRound();
    }, 2500);
  }
}

function showFinalResult(){
  const overlay = document.getElementById('result-overlay');
  document.getElementById('res-title').textContent = '⭐ よくできたね！ ⭐';
  document.getElementById('res-found').textContent = foundTreats.join('');
  document.getElementById('res-detail').textContent = foundTreats.length + 'こ おかし ゲット！';
  overlay.classList.add('show');
}

function resetGame(){
  level = MIN_BOXES;
  clearCount = 0;
  foundTreats = [];
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('box-area').innerHTML = '';
  document.getElementById('startBtn').style.display = '';
  updateScore();
  updateLevel();
  setMsg('');
  phase = 'idle';
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

document.getElementById('startBtn').addEventListener('click', () => startRound());
document.getElementById('restartBtn').addEventListener('click', resetGame);

// ======== キラキラ ========
const spCanvas = document.getElementById('sparkle-canvas');
const spCtx = spCanvas.getContext('2d');
let sparkles = [];
let sparkleAnim = null;

function resizeSparkleCanvas(){
  spCanvas.width = window.innerWidth;
  spCanvas.height = window.innerHeight;
}
resizeSparkleCanvas();
window.addEventListener('resize', resizeSparkleCanvas);

const SPARKLE_COLORS = ['#ffee44','#ff88cc','#88eeff','#aaffaa','#ffaa44','#ffffff','#ff6688'];

function spawnSparkles(cx, cy){
  for(let i = 0; i < 30; i++){
    const angle = Math.random()*Math.PI*2, speed = 2+Math.random()*6;
    sparkles.push({
      x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-2,
      r:3+Math.random()*5, life:1, decay:0.012+Math.random()*0.015,
      color:SPARKLE_COLORS[Math.floor(Math.random()*SPARKLE_COLORS.length)],
      star:Math.random()<0.5, rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.15
    });
  }
  if(!sparkleAnim) sparkleLoop();
}

function sparkleLoop(){
  spCtx.clearRect(0, 0, spCanvas.width, spCanvas.height);
  sparkles = sparkles.filter(p => p.life > 0);
  for(const p of sparkles){
    p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.vx *= 0.99;
    p.life -= p.decay; p.rot += p.rotSpeed;
    if(p.life <= 0) continue;
    spCtx.save(); spCtx.globalAlpha = p.life;
    spCtx.translate(p.x, p.y); spCtx.rotate(p.rot);
    if(p.star){
      spCtx.fillStyle = p.color; spCtx.beginPath();
      for(let i=0;i<4;i++){
        const a=(Math.PI/2)*i;
        spCtx.lineTo(Math.cos(a-0.15)*p.r*0.3, Math.sin(a-0.15)*p.r*0.3);
        spCtx.lineTo(Math.cos(a)*p.r*1.5, Math.sin(a)*p.r*1.5);
      }
      spCtx.closePath(); spCtx.fill();
    } else {
      spCtx.fillStyle = p.color;
      spCtx.beginPath(); spCtx.arc(0,0,p.r,0,Math.PI*2); spCtx.fill();
    }
    spCtx.restore();
  }
  if(sparkles.length > 0){ sparkleAnim = requestAnimationFrame(sparkleLoop); }
  else { sparkleAnim = null; }
}

function doFlash(){
  const fl = document.getElementById('flash-overlay');
  fl.classList.remove('flash'); void fl.offsetWidth; fl.classList.add('flash');
}

// ======== 初期 ========
updateLevel();
updateScore();
</script>
</body>
</html>
